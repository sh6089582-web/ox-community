<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCY ADMIN PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: #050510;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        /* Login Overlay Styles */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-card {
            background: rgba(20, 20, 30, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff0000;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }
        .hidden { display: none !important; }

        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #ff0000;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 14px;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #00ffff;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        button {
            background: linear-gradient(45deg, #ff0000, #00ffff);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }
        .btn-danger {
            background: #ff0000;
            color: #fff;
        }
        .list-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
            border-left: 3px solid #00ffff;
        }
        .list-item span {
            word-break: break-all;
            margin-right: 10px;
            font-size: 14px;
        }
        .action-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color: #00ffff; margin-bottom: 20px;">ADMIN LOGIN</h2>
            <input type="password" id="adminPassInput" placeholder="Enter Admin Password">
            <br><br>
            <button onclick="checkAdminPassword()">ACCESS PANEL</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <h1>⚫ BCY ADMIN PANEL ⚫</h1>

        <div class="container">
            <div class="card">
                <h2>⚙️ App Global Settings</h2>
                <div class="form-group">
                    <label>Welcome Title</label>
                    <input type="text" id="wTitle" placeholder="e.g. BCY COMMUNITY">
                </div>
                <div class="form-group">
                    <label>Welcome Message</label>
                    <input type="text" id="wMsg" placeholder="e.g. Welcome to BCY Community">
                </div>
                <div class="form-group">
                    <label>Home Screen Title</label>
                    <input type="text" id="hTitle" placeholder="e.g. BCY VIP HACK">
                </div>
                <div class="form-group">
                    <label>Logo URL</label>
                    <input type="text" id="lUrl" placeholder="Direct image link for logo">
                </div>
                <div class="form-group">
                    <label>Telegram Group Link</label>
                    <input type="text" id="tgLink" placeholder="https://t.me/...">
                </div>
                <div class="form-group">
                    <label>Get Key Link</label>
                    <input type="text" id="keyLink" placeholder="Link for users to get access key">
                </div>
                <div class="form-group">
                    <label>Developer Option Link</label>
                    <input type="text" id="devLink" placeholder="Developer contact link">
                </div>
                <div class="form-group">
                    <label>Trading Tips (HTML allowed)</label>
                    <textarea id="tTips" rows="3" placeholder="সবাই ৫ স্টেপ মেইনটেইন করবেন।"></textarea>
                </div>
                <button onclick="updateSettings()">Update Settings</button>
            </div>

            <div class="card">
                <h2>🎵 Music Management</h2>
                <div class="action-flex">
                    <input type="text" id="newSongUrl" placeholder="Enter Google Drive Link">
                    <button onclick="addSong()">Add Song</button>
                </div>
                <div class="list-box" id="songsList"></div>
            </div>

            <div class="card">
                <h2>🔑 Password / Key Management</h2>
                <div class="action-flex">
                    <input type="text" id="newPassword" placeholder="Enter new password">
                    <button onclick="addPassword()">Add Password</button>
                </div>
                <div class="list-box" id="passwordsList"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Password Protection Logic ---
        function checkAdminPassword() {
            const pass = document.getElementById('adminPassInput').value;
            const correctPass = "BCY@7978"; // আপনার দেওয়া পাসওয়ার্ড

            if(pass === correctPass) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        }

        // Enter key press support for login
        document.getElementById("adminPassInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { checkAdminPassword(); }
        });

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCEFchv7tK3jLduyAw0XoMD3UmtX3YlPTw",
            authDomain: "shakil-owner.firebaseapp.com",
            databaseURL: "https://shakil-owner-default-rtdb.firebaseio.com",
            projectId: "shakil-owner",
            storageBucket: "shakil-owner.firebasestorage.app",
            messagingSenderId: "496094460430",
            appId: "1:496094460430:web:18c921455e10ecd0f61a5f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Load and Update App Settings
        db.ref('appSettings').on('value', snapshot => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('wTitle').value = data.welcomeTitle || "";
                document.getElementById('wMsg').value = data.welcomeMessage || "";
                document.getElementById('hTitle').value = data.homeTitle || "";
                document.getElementById('lUrl').value = data.logoUrl || "";
                document.getElementById('tgLink').value = data.telegramLink || "";
                document.getElementById('keyLink').value = data.getKeyLink || "";
                document.getElementById('devLink').value = data.devLink || "";
                document.getElementById('tTips').value = data.tradingTips || "";
            }
        });

        function updateSettings() {
            db.ref('appSettings').update({
                welcomeTitle: document.getElementById('wTitle').value,
                welcomeMessage: document.getElementById('wMsg').value,
                homeTitle: document.getElementById('hTitle').value,
                logoUrl: document.getElementById('lUrl').value,
                telegramLink: document.getElementById('tgLink').value,
                getKeyLink: document.getElementById('keyLink').value,
                devLink: document.getElementById('devLink').value,
                tradingTips: document.getElementById('tTips').value
            }).then(() => alert("Settings Updated Successfully!"))
              .catch(err => alert("Error: " + err.message));
        }

        // 2. Music Management
        db.ref('songs').on('value', snapshot => {
            const list = document.getElementById('songsList');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const key = child.key;
                const url = child.val();
                list.innerHTML += `
                    <div class="list-item">
                        <span>${url.substring(0, 50)}...</span>
                        <button class="btn-danger" onclick="deleteSong('${key}')" style="padding:5px 10px;">Delete</button>
                    </div>
                `;
            });
        });

        function addSong() {
            const url = document.getElementById('newSongUrl').value.trim();
            if(!url) return alert("Please enter a link!");
            db.ref('songs').push(url);
            document.getElementById('newSongUrl').value = "";
        }

        function deleteSong(key) {
            if(confirm("Are you sure?")) db.ref('songs/' + key).remove();
        }

        // 3. Password Management
        db.ref('passwords').on('value', snapshot => {
            const list = document.getElementById('passwordsList');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const pass = child.key;
                list.innerHTML += `
                    <div class="list-item">
                        <span>${pass}</span>
                        <button class="btn-danger" onclick="deletePassword('${pass}')" style="padding:5px 10px;">Delete</button>
                    </div>
                `;
            });
        });

        function addPassword() {
            const pass = document.getElementById('newPassword').value.trim();
            if(!pass) return alert("Enter password!");
            db.ref('passwords/' + pass).set(true);
            document.getElementById('newPassword').value = "";
        }

        function deletePassword(pass) {
            if(confirm("Delete this password?")) db.ref('passwords/' + pass).remove();
        }
    </script>
</body>
                    </html>
