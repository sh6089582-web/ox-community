<!DOCTYPE html>
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  
    <title>OX COMMUNITY AI</title>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>  

<style>  
    html, body {   
        margin: 0; padding: 0;   
        height: 100%; width: 100%;   
        overflow: hidden;   
        background: #020205;   
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
    }  

    /* Welcome Screen - Enhanced */  
    #welcomeScreen {  
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;  
        background: linear-gradient(45deg, #ff0000, #00ffff, #ff0000);  
        color: #000; z-index: 20000; /* Highest priority */  
        display: flex; flex-direction: column; justify-content: center; align-items: center;  
        text-align: center; font-size: 24px; font-weight: bold;  
        transition: opacity 0.5s ease-out;  
    }  
    @keyframes pulse {  
        0%, 100% { opacity: 1; transform: scale(1); }  
        50% { opacity: 0.8; transform: scale(1.05); }  
    }  
    .welcome-title { font-size: 48px; text-shadow: 0 0 20px #00ffff; margin-bottom: 20px; animation: pulse 2s infinite; }  

    /* Lock Screen */  
    #lockScreen {  
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;  
        background: #000; color: #ff0000; z-index: 30000;  
        display: none; flex-direction: column; justify-content: center; align-items: center;  
        text-align: center; font-size: 20px; font-weight: bold;  
    }  

    /* Bottom Navigation */  
    #bottomNav {  
        position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;  
        background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);  
        display: flex; z-index: 10000; border-top: 2px solid rgba(0,255,255,0.3);  
        box-shadow: 0 -5px 20px rgba(255,0,0,0.3);  
    }  
    .nav-btn {  
        flex: 1; padding: 15px 10px; border: none; background: transparent;  
        color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;  
        transition: all 0.3s ease; position: relative; overflow: hidden;  
    }  
    .nav-btn.active {  
        background: linear-gradient(45deg, #ff0000, #00ffff);  
        box-shadow: 0 0 20px rgba(255,0,0,0.5);  
        color: #000;  
    }  

    #mainContent {  
        position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 70px);  
        overflow: hidden;  
    }  

    .bg-animation {  
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;  
        background: linear-gradient(transparent 95%, rgba(255, 0, 0, 0.1) 50%),  
                    linear-gradient(90deg, transparent 95%, rgba(0, 255, 255, 0.1) 50%);  
        background-size: 30px 30px; z-index: 0;  
    }  

    .iframe-container {  
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;  
        z-index: 1; display: none; justify-content: center;  
    }  
    .iframe-container.active { display: flex; }  
    iframe { width: 100%; max-width: 450px; height: 100%; border: none; background: #000; }  

    #aiPredictionPage, #stepMakerPage {  
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;  
        background: rgba(2,2,5,0.98); z-index: 2; display: none; flex-direction: column; overflow-y: auto;  
    }  
    #aiPredictionPage.active, #stepMakerPage.active { display: flex; }  

    .pred-box-container {  
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);  
        width: 90%; max-width: 500px; z-index: 10;  
    }  
    .pred-box {  
        background: rgba(10, 5, 5, 0.98); border-radius: 25px; color: #fff;  
        padding: 30px 25px; text-align: center; border: 3px solid rgba(0, 255, 255, 0.5);  
        box-shadow: 0 20px 40px rgba(255,0,0,0.3);  
    }  
    .pred-header {  
        display: flex; align-items: center; justify-content: space-between;  
        margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid rgba(255, 0, 0, 0.5);  
    }  
    .header-left { display: flex; align-items: center; gap: 12px; }  
    .header-logo { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #00ffff; object-fit: cover; }  
    .pred-title { font-size: 18px; font-weight: 900; color: #00ffff; text-shadow: 0 0 10px #ff0000; }  
      
    .tg-link { background: #0088cc; border-radius: 50%; padding: 8px; display: flex; text-decoration: none; }  
    .tg-link img { width: 20px; height: 20px; }  

    input.pred-input {  
        width: 85%; padding: 15px; background: #000; border: 2px solid #ff0000;  
        border-radius: 15px; color: #fff; margin-bottom: 20px; font-size: 16px; text-align: center; outline: none;  
        font-weight: bold;  
    }  
    .btn-pred-login {  
        width: 90%; padding: 18px 0; border-radius: 15px; border: none;  
        font-size: 16px; font-weight: bold; cursor: pointer; background: #00ffff; color: #000;  
        box-shadow: 0 5px 15px rgba(0,255,255,0.4); margin-bottom: 15px;  
    }  
    .btn-get-key {  
        width: 90%; padding: 15px 0; border-radius: 15px; border: 2px solid #0088cc;  
        font-size: 16px; font-weight: bold; cursor: pointer; background: transparent; color: #0088cc;  
        text-decoration: none; display: inline-block; margin-bottom: 10px;  
    }  
    .btn-dev-option {  
        width: 90%; padding: 15px 0; border-radius: 15px; border: 2px solid #00ffff;  
        font-size: 16px; font-weight: bold; cursor: pointer; background: transparent; color: #00ffff;  
        text-decoration: none; display: inline-block; box-shadow: 0 0 10px rgba(0,255,255,0.2);  
    }  

    .pred-signal-area {   
        margin: 25px 0; background: rgba(255, 0, 0, 0.2); border-radius: 20px;   
        padding: 25px; border: 2px solid rgba(0, 255, 255, 0.4);   
    }  
    .pred-signal-text { font-size: 36px; font-weight: 900; text-shadow: 0 0 15px currentColor; }  
    .pred-timer { font-size: 20px; color: #00ffff; font-weight: bold; }  

    .pred-advice-box {  
        margin-top: 25px; background: rgba(0, 255, 0, 0.15); border-radius: 20px;   
        padding: 20px; border: 2px solid rgba(0, 255, 255, 0.4);   
    }  
    .pred-advice-title { font-size: 16px; color: #00ffff; font-weight: bold; margin-bottom: 10px; }  
    .pred-advice-text { font-size: 14px; color: #fff; line-height: 1.4; }  
      
    .music-fab {   
        position: fixed; top: 15px; right: 15px; z-index: 10002; cursor: pointer;   
        width: 40px; height: 40px; background: #00ffff; border-radius: 50%;   
        display: flex; justify-content: center; align-items: center;   
        font-size: 20px; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);  
        color: #000;  
    }  
</style>

</head>  
<body>  

<div id="welcomeScreen">  
    <div class="welcome-title" id="dynWelcomeTitle">OX TEAM</div>  
    <div style="font-size: 18px;" id="dynWelcomeMsg">𝕎𝕖𝕝𝕔𝕠𝕞𝕖 𝕥𝕠 𝕆𝕏 ℂ𝕠𝕞𝕞𝕦𝕟𝕚𝕥𝕪</div>  
</div>  

<div id="lockScreen">  
    DEVICE LOCKED BY ADMIN<br>  
    <span id="myIdLock" style="color:cyan; font-size:12px;">ID:-5475</span>  
</div>  

<div id="mainContent">  
    <div class="bg-animation dyn-bg"></div>  
    <div id="hgzyPage" class="iframe-container active">  
        <iframe src="https://dkwin9.com/#/register?invitationCode=18533875957"></iframe>  
    </div>  

    <div id="aiPredictionPage">  
        <div class="bg-animation dyn-bg" style="opacity: 0.3;"></div>  
        <div class="pred-box-container">  
            <div class="pred-box" id="predMainContainer">  
                <div class="pred-header">  
                    <div class="header-left">  
                        <img src="abba.jpg" class="header-logo" id="dynLogo">  
                        <div class="pred-title" id="dynHomeTitle">OX TEAM</div>  
                    </div>  
                    <a href="https://t.me/+I4yLTxLTYOpkOTk1" target="_blank" class="tg-link" id="dynTgLink">  
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="TG">  
                    </a>  
                </div>  

                <div id="predLoginSection">  
                    <input type="text" class="pred-input" id="predPassInput" placeholder="ENTER PASSWORD">  
                    <button class="btn-pred-login" id="predLoginBtn">LOGIN</button>  
                    <a href="https://t.me/BCY_SHAKIL_OWNER" target="_blank" class="btn-get-key" id="dynGetKey">GET KEY</a>  
                    <a href="https://t.me/DeveloperUsername" target="_blank" class="btn-dev-option" id="dynDevLink">DEVELOPER</a>  
                </div>  

                <div id="predSignalSection" style="display:none;">  
                    <div id="predTimeText" style="font-size:14px; color:#aaa; margin-bottom:8px;">00:00:00</div>  
                    <div class="pred-signal-area">  
                        <div style="font-size:12px; color:#ccc; margin-bottom:5px;">PREDICTION</div>  
                        <div id="predSignalResult" class="pred-signal-text">WAIT</div>  
                        <div class="pred-timer"><span id="predTimerCount">30</span>s</div>  
                    </div>  

                    <div class="pred-advice-box">  
                        <div class="pred-advice-title">💡 ট্রেডিং টিপস</div>  
                        <div class="pred-advice-text" id="dynTradingTips">  
                            সবাই ৫ স্টেপ মেইনটেইন করবেন।  
                        </div>  
                    </div>  
                </div>  
            </div>  
        </div>  
    </div>  

    <div id="stepMakerPage">  
        <div class="bg-animation dyn-bg" style="opacity: 0.3;"></div>  
        <div class="pred-box-container">  
            <div class="pred-box">  
                <div class="pred-title" style="margin-bottom:20px;">😈OX TEAM😈</div>  
                <input type="number" class="pred-input" id="stepBal" placeholder="Current Balance">  
                <input type="number" class="pred-input" id="stepTotal" placeholder="Total Steps">  
                <button class="btn-pred-login" onclick="calculateSteps()">CALCULATE</button>  
                <div id="stepResult" style="margin-top:20px; color:#fff; text-align:left; max-height:200px; overflow-y:auto;"></div>  
            </div>  
        </div>  
    </div>  
</div>  

<div id="bottomNav">  
    <button class="nav-btn active" id="hgzyBtn">DKWIN</button>  
    <button class="nav-btn" id="aiPredBtn">AI</button>  
    <button class="nav-btn" id="stepBtn">STEP</button>  
</div>  

<div class="music-fab" id="musicBtn" title="Single click: Play/Pause | Double click: Next">🎵</div>  

<script>  
    // Firebase Initialization
    const firebaseConfig = {  
        apiKey: "AIzaSyCEFchv7tK3jLduyAw0XoMD3UmtX3YlPTw",  
        authDomain: "shakil-owner.firebaseapp.com",  
        databaseURL: "https://shakil-owner-default-rtdb.firebaseio.com",  
        projectId: "shakil-owner",  
        storageBucket: "shakil-owner.firebasestorage.app",  
        messagingSenderId: "496094460430",  
        appId: "1:496094460430:web:18c921455e10ecd0f61a5f"  
    };  
    firebase.initializeApp(firebaseConfig);  
    const db = firebase.database();  
  
    // Device ID & Lock Logic
    let myId = localStorage.getItem("BCY_SHAKIL_OWNER id") || "ID-" + Math.floor(1000 + Math.random() * 9000);  
    localStorage.setItem("BCY_SHAKIL_OWNER id", myId);  
    document.getElementById("myIdLock").innerText = "ID: " + myId;  
  
    // --- সমাধান: ওয়েলকাম স্ক্রিন সরানোর ফাংশন ---
    function hideWelcomeScreen() {
        const ws = document.getElementById("welcomeScreen");
        if(ws) {
            ws.style.opacity = "0";
            setTimeout(() => { ws.style.display = "none"; }, 500);
        }
    }
    // লিঙ্ক তৈরি করার পর যাতে আটকে না থাকে, তাই ৩ সেকেন্ড পর অটোমেটিক সরবে
    setTimeout(hideWelcomeScreen, 3000); 
  
    // Admin Settings Listener
    db.ref('appSettings').on('value', snapshot => {  
        const data = snapshot.val();  
        if(data) {  
            if(data.telegramLink) document.getElementById('dynTgLink').href = data.telegramLink;  
            if(data.getKeyLink) document.getElementById('dynGetKey').href = data.getKeyLink;  
            if(data.devLink) document.getElementById('dynDevLink').href = data.devLink;  
            if(data.tradingTips) document.getElementById('dynTradingTips').innerHTML = data.tradingTips;  
            if(data.welcomeMessage) document.getElementById('dynWelcomeMsg').innerHTML = data.welcomeMessage;  
            if(data.welcomeTitle) document.getElementById('dynWelcomeTitle').innerHTML = data.welcomeTitle;  
            if(data.homeTitle) document.getElementById('dynHomeTitle').innerHTML = data.homeTitle;  
            if(data.logoUrl) document.getElementById('dynLogo').src = data.logoUrl;  
            if(data.backgroundUrl) {  
                document.querySelectorAll('.dyn-bg').forEach(el => {  
                    el.style.backgroundImage = `url('${data.backgroundUrl}')`;  
                    el.style.backgroundSize = "cover";  
                });  
            }  
            // ডেটা লোড হয়ে গেলে সাথে সাথে ওয়েলকাম স্ক্রিন সরিয়ে ফেলা
            hideWelcomeScreen();
        }  
    });  
  
    // --- সমাধান: মিউজিক প্লেয়ার লজিক ---
    let songsList = [  
        "https://docs.google.com/uc?export=download&id=YOUR_DEFAULT_ID"
    ];  
    let currentSongIndex = 0;  
    let audio = new Audio();  
    let isPlaying = false;  
  
    db.ref('songs').on('value', snap => {  
        if(snap.exists()){  
            songsList = Object.values(snap.val()); 
            if(!isPlaying) audio.src = songsList[currentSongIndex];
        }  
    });  
  
    function playNextSong() {  
        if(songsList.length > 0) {  
            currentSongIndex = (currentSongIndex + 1) % songsList.length;  
            audio.src = songsList[currentSongIndex];  
            audio.play().catch(e => console.log("Play failed:", e));  
            isPlaying = true;  
        }  
    }  
  
    audio.onended = playNextSong;  
  
    let clickTimer = null;  
    document.getElementById("musicBtn").onclick = () => {  
        if (clickTimer === null) {  
            clickTimer = setTimeout(() => {  
                clickTimer = null;  
                if(isPlaying) { 
                    audio.pause(); 
                    isPlaying = false;
                } else { 
                    if(!audio.src && songsList.length > 0) audio.src = songsList[0];
                    audio.play().catch(e => console.log("User must interact first")); 
                    isPlaying = true;
                }  
            }, 300);  
        } else {  
            clearTimeout(clickTimer);  
            clickTimer = null;  
            playNextSong();  
        }  
    };  
  
    // Device Blocking
    db.ref('blockedDevices/' + myId).on('value', s => {  
        const isLocked = s.val() === true;  
        document.getElementById("lockScreen").style.display = isLocked ? "flex" : "none";  
        if(isLocked) { audio.pause(); isPlaying = false; }  
    });  
  
    // Navigation Logic
    const pages = { hgzy: document.getElementById("hgzyPage"), ai: document.getElementById("aiPredictionPage"), step: document.getElementById("stepMakerPage") };  
    const navBtns = { hgzy: document.getElementById("hgzyBtn"), ai: document.getElementById("aiPredBtn"), step: document.getElementById("stepBtn") };  
  
    function showPage(pageKey) {  
        Object.values(pages).forEach(p => p.classList.remove("active"));  
        Object.values(navBtns).forEach(btn => btn.classList.remove("active"));  
        pages[pageKey].classList.add("active");  
        navBtns[pageKey].classList.add("active");  
    }  
  
    navBtns.hgzy.onclick = () => showPage("hgzy");  
    navBtns.ai.onclick = () => showPage("ai");  
    navBtns.step.onclick = () => showPage("step");  
  
    // Login & Prediction
    let predLastInterval = -1;  
    document.getElementById("predLoginBtn").onclick = () => {  
        const input = document.getElementById("predPassInput").value.trim();  
        if(!input) return alert("Enter password!");  
        db.ref('passwords/' + input).once('value', snapshot => {  
            if(snapshot.exists() || input === "BrandAzmainBOSS") {  
                document.getElementById("predLoginSection").style.display = "none";  
                document.getElementById("predSignalSection").style.display = "block";  
                startPredSignals();  
            } else { alert("Invalid Password!"); }  
        });  
    };  
  
    function startPredSignals() {  
        setInterval(() => {  
            let now = new Date();  
            let ms = now.getTime();  
            let interval = Math.floor(ms / 30000);  
            if(interval !== predLastInterval) {  
                predLastInterval = interval;  
                const list = ["BIG 7,9", "SMALL 0,2", "SMALL 1,3", "BIG 6,8", "BIG 5", "SMALL 4"];  
                let res = list[Math.floor(Math.random() * list.length)];  
                let el = document.getElementById("predSignalResult");  
                el.innerText = res;  
                el.style.color = res.includes("BIG") ? "#00ff00" : "#00ffff";  
            }  
            document.getElementById("predTimerCount").innerText = 30 - (Math.floor(ms / 1000) % 30);  
            document.getElementById("predTimeText").innerText = now.toLocaleTimeString();  
        }, 1000);  
    }  
  
    // Step Calculator
    function calculateSteps() {  
        let b = parseFloat(document.getElementById('stepBal').value);  
        let s = parseInt(document.getElementById('stepTotal').value);  
        if(!b || !s) return alert("Enter details!");  
        let output = "";  
        let firstStep = b / (Math.pow(2, s) - 1);  
        for(let i=0; i<s; i++) {  
            output += `<p style="margin:5px 0; border-bottom:1px solid #444;">Step ${i+1}: ${(firstStep * Math.pow(2, i)).toFixed(2)}</p>`;  
        }  
        document.getElementById('stepResult').innerHTML = output;  
    }  
</script>  
</body>  
  </html>
